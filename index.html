<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Мини-Игры</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            color: #fff;
            user-select: none;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 8px 16px 0;
            flex-shrink: 0;
            z-index: 3;
        }
        .coins-display {
            background: #1a1a1a;
            border: 1px solid #ffb800;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 15px;
            font-weight: 700;
            color: #ffb800;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .coins-display.flash {
            animation: coinFlash 0.5s ease-out;
        }
        @keyframes coinFlash {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.3); background: #ffb800; color: #000; }
        }
        .tabs {
            display: flex;
            padding: 8px 12px 4px;
            gap: 4px;
            flex-shrink: 0;
            z-index: 2;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab {
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            min-width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab.active { border-color: #ff6347; color: #fff; background: #2a1a1a; }
        .page {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            overflow-y: auto;
        }
        .page.active { display: flex; }

        .fire-emoji {
            font-size: 100px; display: block;
            animation: tgPulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px #ff4500) drop-shadow(0 0 60px #ff6347);
        }
        .fire-emoji.dead { animation: none; filter: grayscale(1) brightness(0.4); transform: scale(0.8); }
        @keyframes tgPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
        .streak-count { font-size: 64px; font-weight: 900; text-shadow: 0 0 40px #ff4500, 0 0 80px #ff6347; margin: 8px 0; }
        .streak-label { font-size: 14px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
        .info-text { color: #666; font-size: 13px; margin-top: 8px; text-align: center; }

        .dice-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 20px 0; min-height: 120px; align-items: center; }
        .dice-tg { font-size: 80px; display: inline-block; }
        .dice-tg.rolling { animation: tgDiceRoll 0.6s ease-out; }
        @keyframes tgDiceRoll {
            0% { transform: translateY(-40px) rotate(-180deg) scale(1.4); opacity: 0; }
            30% { transform: translateY(10px) rotate(90deg) scale(1.1); opacity: 1; }
            60% { transform: translateY(-5px) rotate(-45deg) scale(0.95); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }
        .dice-selector { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; justify-content: center; }
        .dice-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
        .dice-btn.active { border-color: #ff6347; background: #2a1a1a; }

        .slot-container { display: flex; gap: 12px; margin: 20px 0; }
        .slot-tg {
            font-size: 60px; background: #111; border-radius: 14px;
            padding: 8px; width: 75px; height: 85px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333; overflow: hidden;
        }
        .slot-tg span { display: block; }
        .slot-tg.spinning span { animation: tgSlotSpin 0.12s linear infinite; }
        @keyframes tgSlotSpin {
            0% { transform: translateY(-25px); opacity: 0; }
            50% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(25px); opacity: 0; }
        }
        .slot-result { font-size: 18px; font-weight: 700; margin-top: 16px; min-height: 28px; }
        .slot-win { color: #ffb800; text-shadow: 0 0 20px #ffb800; animation: tgPulse 0.8s ease-in-out infinite; }

        .tg-emoji { font-size: 100px; display: block; }
        .tg-emoji.shooting { animation: tgBasketShoot 0.7s ease-out; }
        @keyframes tgBasketShoot {
            0% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-80px) scale(1.3); }
            60% { transform: translateY(-90px) scale(0.8); }
            100% { transform: translateY(0) scale(1); }
        }
        .tg-emoji.kicking { animation: tgFootballKick 0.6s ease-out; }
        @keyframes tgFootballKick {
            0% { transform: translateX(-60px) rotate(0deg) scale(1); }
            50% { transform: translateX(20px) rotate(-360deg) scale(1.3); }
            100% { transform: translateX(60px) rotate(-720deg) scale(0.7); }
        }
        .tg-emoji.rolling { animation: tgBowlingRoll 0.8s ease-out; }
        @keyframes tgBowlingRoll {
            0% { transform: translateX(-60px) rotate(0deg); }
            30% { transform: translateX(0) rotate(-180deg) scale(1.2); }
            100% { transform: translateX(60px) rotate(-360deg) scale(0.6); }
        }
        .tg-emoji.throwing { animation: tgDartsThrow 0.5s ease-out; }
        @keyframes tgDartsThrow {
            0% { transform: translateY(-60px) scale(0.5); opacity: 0; }
            60% { transform: translateY(10px) scale(1.3); opacity: 1; }
            80% { transform: translateY(-5px) scale(0.9); }
            100% { transform: translateY(0) scale(1); }
        }
        .sport-score { font-size: 20px; font-weight: 700; margin-top: 12px; min-height: 28px; }
        .goal-text { color: #4ade80; font-weight: 700; animation: tgPulse 0.5s ease-in-out 4; }

        .reward-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #1a1a1a;
            border: 2px solid #ffb800;
            border-radius: 16px;
            padding: 16px 24px;
            z-index: 50;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            color: #ffb800;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .reward-popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .bottom-panel { padding: 10px 16px 18px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; z-index: 2; }
        .btn { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; letter-spacing: 1px; text-align: center; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-fire { background: linear-gradient(135deg, #ff4500, #ff6347); color: #fff; box-shadow: 0 6px 24px rgba(255,69,0,0.4); }
        .btn-disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn-reset { background: none; border: 1px solid #ff5252; color: #ff5252; font-size: 13px; padding: 10px; }
        .btn-roll { background: linear-gradient(135deg, #4a9eff, #6ab4ff); color: #fff; box-shadow: 0 6px 24px rgba(74,158,255,0.4); }
        .btn-spin { background: linear-gradient(135deg, #b44aff, #c97aff); color: #fff; box-shadow: 0 6px 24px rgba(180,74,255,0.4); }
        .btn-basket { background: linear-gradient(135deg, #ff8c00, #ffa500); color: #fff; box-shadow: 0 6px 24px rgba(255,140,0,0.4); }
        .btn-football { background: linear-gradient(135deg, #4ade80, #22c55e); color: #000; box-shadow: 0 6px 24px rgba(74,222,128,0.4); }
        .btn-bowling { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; box-shadow: 0 6px 24px rgba(251,191,36,0.4); }
        .btn-darts { background: linear-gradient(135deg, #f87171, #ef4444); color: #fff; box-shadow: 0 6px 24px rgba(248,113,113,0.4); }

        .toast { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%) translateY(100px); background: #222; color: #fff; padding: 12px 24px; border-radius: 25px; font-size: 14px; z-index: 10; transition: transform 0.4s; text-align: center; max-width: 90%; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.fire-toast { background: #ff4500; color: #fff; font-weight: 600; }
        .particles { position: fixed; top:0; left:0; right:0; bottom:0; pointer-events: none; z-index:0; }
        .particle { position: absolute; width: 5px; height: 5px; border-radius: 50%; animation: floatUp 1.5s ease-out forwards; opacity: 0; }
        @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:0.8;} 100%{transform:translateY(-250px) scale(0);opacity:0;} }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="reward-popup" id="rewardPopup"></div>

<div class="top-bar">
    <div class="coins-display" id="coinsDisplay">🪙 100</div>
</div>

<div class="tabs">
    <button class="tab active" onclick="switchTab('fire')">🔥</button>
    <button class="tab" onclick="switchTab('dice')">🎲</button>
    <button class="tab" onclick="switchTab('casino')">🎰</button>
    <button class="tab" onclick="switchTab('basket')">🏀</button>
    <button class="tab" onclick="switchTab('football')">⚽</button>
    <button class="tab" onclick="switchTab('bowling')">🎳</button>
    <button class="tab" onclick="switchTab('darts')">🎯</button>
</div>

<!-- Огонёк -->
<div class="page active" id="page-fire">
    <span class="fire-emoji" id="fireEmoji">🔥</span>
    <div class="streak-label">дней подряд</div>
    <div class="streak-count" id="streakCount">0</div>
    <p class="info-text" id="infoText">Нажми, чтобы зажечь огонь!</p>
</div>

<!-- Кубики -->
<div class="page" id="page-dice">
    <div class="dice-container" id="diceContainer"><span class="dice-tg">🎲</span></div>
    <div class="dice-selector">
        <button class="dice-btn active" onclick="setDiceCount(1)">1</button>
        <button class="dice-btn" onclick="setDiceCount(2)">2</button>
        <button class="dice-btn" onclick="setDiceCount(3)">3</button>
        <button class="dice-btn" onclick="setDiceCount(4)">4</button>
        <button class="dice-btn" onclick="setDiceCount(5)">5</button>
    </div>
</div>

<!-- Казино -->
<div class="page" id="page-casino">
    <div class="slot-container" id="slotContainer">
        <div class="slot-tg"><span>🎰</span></div>
        <div class="slot-tg"><span>🎰</span></div>
        <div class="slot-tg"><span>🎰</span></div>
    </div>
    <div class="slot-result" id="slotResult"></div>
</div>

<!-- Баскетбол -->
<div class="page" id="page-basket">
    <span class="tg-emoji" id="basketEmoji">🏀</span>
    <div class="sport-score" id="basketScore">Бросай!</div>
</div>

<!-- Футбол -->
<div class="page" id="page-football">
    <span class="tg-emoji" id="footballEmoji">⚽</span>
    <div class="sport-score" id="footballScore">Бей!</div>
</div>

<!-- Боулинг -->
<div class="page" id="page-bowling">
    <span class="tg-emoji" id="bowlingEmoji">🎳</span>
    <div class="sport-score" id="bowlingScore">Бросай!</div>
</div>

<!-- Дартс -->
<div class="page" id="page-darts">
    <span class="tg-emoji" id="dartsEmoji">🎯</span>
    <div class="sport-score" id="dartsScore">Кидай!</div>
</div>

<!-- Кнопки -->
<div class="bottom-panel" id="bottomFire">
    <button class="btn btn-fire" id="mainBtn" onclick="handlePress()">🔥 Зажечь огонь</button>
    <button class="btn btn-reset" onclick="resetStreak()">🔄 Сбросить</button>
</div>
<div class="bottom-panel" id="bottomDice" style="display:none;"><button class="btn btn-roll" onclick="rollDice()">🎲 Бросить</button></div>
<div class="bottom-panel" id="bottomCasino" style="display:none;"><button class="btn btn-spin" onclick="spinCasino()">🎰 Крутить</button></div>
<div class="bottom-panel" id="bottomBasket" style="display:none;"><button class="btn btn-basket" onclick="shootBasket()">🏀 Бросок</button></div>
<div class="bottom-panel" id="bottomFootball" style="display:none;"><button class="btn btn-football" onclick="kickFootball()">⚽ Удар</button></div>
<div class="bottom-panel" id="bottomBowling" style="display:none;"><button class="btn btn-bowling" onclick="rollBowling()">🎳 Бросок</button></div>
<div class="bottom-panel" id="bottomDarts" style="display:none;"><button class="btn btn-darts" onclick="throwDarts()">🎯 Бросок</button></div>

<div class="toast" id="toast"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    // ===== МОНЕТЫ =====
    const COINS_KEY = 'fire_coins_balance';
    let coins = 100;

    function loadCoins() {
        const r = localStorage.getItem(COINS_KEY);
        if (r) coins = parseInt(r) || 100;
        else { coins = 100; saveCoins(); }
        updateCoinsDisplay();
    }
    function saveCoins() { localStorage.setItem(COINS_KEY, String(coins)); }
    function addCoins(amount) {
        coins += amount;
        saveCoins();
        updateCoinsDisplay();
        flashCoins();
        showReward(`+${amount} 🪙`);
    }
    function updateCoinsDisplay() {
        document.getElementById('coinsDisplay').textContent = '🪙 ' + coins;
    }
    function flashCoins() {
        const el = document.getElementById('coinsDisplay');
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
    }
    function showReward(text) {
        const popup = document.getElementById('rewardPopup');
        popup.textContent = text;
        popup.classList.add('show');
        setTimeout(() => popup.classList.remove('show'), 1500);
    }

    // ===== ОГОНЁК =====
    const STREAK_KEY = 'fire_simple_streak_v2';
    let streak = { count: 0, lastPressDate: null };

    function getDateStr(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function getToday() { return getDateStr(new Date()); }
    function getYesterday() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return getDateStr(d);
    }

    function loadStreak() {
        const r = localStorage.getItem(STREAK_KEY);
        if (r) {
            try { streak = JSON.parse(r); } catch (e) { streak = { count: 0, lastPressDate: null }; }
        }
        if (!streak || typeof streak.count !== 'number') streak = { count: 0, lastPressDate: null };

        // Проверяем, не пропущен ли день
        if (streak.lastPressDate) {
            const today = getToday();
            const yesterday = getYesterday();
            if (streak.lastPressDate !== today && streak.lastPressDate !== yesterday) {
                streak.count = 0;
                streak.lastPressDate = null;
            }
        }
        saveStreak();
    }
    function saveStreak() { localStorage.setItem(STREAK_KEY, JSON.stringify(streak)); }
    function canPressToday() { return streak.lastPressDate !== getToday(); }

    function handlePress() {
        if (!canPressToday()) {
            st('Уже нажал сегодня! 🔥', false);
            shakeFire();
            return;
        }
        streak.count++;
        streak.lastPressDate = getToday();
        saveStreak();
        addCoins(5);
        sp('#ff4500', '#ffa500');
        st('+1 день! 🔥', true);
        updateFireUI();
    }
    function resetStreak() {
        if (!confirm(`Сбросить (${streak.count} дн.)?`)) return;
        streak.count = 0;
        streak.lastPressDate = null;
        saveStreak();
        updateFireUI();
        st('Сброшен 🔄', false);
    }
    function updateFireUI() {
        const fe = document.getElementById('fireEmoji');
        const ce = document.getElementById('streakCount');
        const btn = document.getElementById('mainBtn');
        const it = document.getElementById('infoText');
        ce.textContent = streak.count;
        if (streak.count === 0) {
            fe.className = 'fire-emoji dead';
            fe.textContent = '🔥';
            it.textContent = 'Нажми, чтобы зажечь огонь!';
        } else if (streak.count >= 100) {
            fe.className = 'fire-emoji';
            fe.textContent = '💥';
            it.textContent = 'ЭПИЧЕСКИЙ ОГОНЬ!';
        } else if (streak.count >= 30) {
            fe.className = 'fire-emoji';
            fe.textContent = '💥';
            it.textContent = 'Легендарный огонь!';
        } else if (streak.count >= 7) {
            fe.className = 'fire-emoji';
            fe.textContent = '🔥';
            it.textContent = 'Огонь всё сильнее!';
        } else {
            fe.className = 'fire-emoji';
            fe.textContent = '🔥';
            it.textContent = 'Продолжай!';
        }
        if (canPressToday()) {
            btn.className = 'btn btn-fire';
            btn.textContent = streak.count === 0 ? '🔥 Зажечь огонь' : '🔥 Поддержать';
            btn.disabled = false;
        } else {
            btn.className = 'btn btn-disabled';
            btn.textContent = '✅ Сегодня уже есть';
            btn.disabled = true;
            it.textContent = 'Возвращайся завтра!';
        }
    }
    function shakeFire() {
        const el = document.getElementById('fireEmoji');
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'tgPulse 0.3s ease-in-out 3';
        setTimeout(() => { el.style.animation = 'tgPulse 1.5s ease-in-out infinite'; }, 900);
    }

    // ===== КУБИКИ =====
    const DF = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
    let dc = 1;
    function setDiceCount(n) {
        dc = n;
        document.querySelectorAll('.dice-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
        rd();
    }
    function rd() {
        const c = document.getElementById('diceContainer');
        c.innerHTML = '';
        for (let i = 0; i < dc; i++) {
            const s = document.createElement('span');
            s.className = 'dice-tg';
            s.textContent = '🎲';
            c.appendChild(s);
        }
    }
    function rollDice() {
        const de = document.querySelectorAll('#diceContainer .dice-tg');
        de.forEach(d => { d.classList.add('rolling'); d.textContent = '🎲'; });
        addCoins(1);
        setTimeout(() => {
            de.forEach(d => {
                d.textContent = DF[Math.floor(Math.random() * 6)];
                d.classList.remove('rolling');
            });
        }, 600);
    }

    // ===== КАЗИНО =====
    const SI = ['7️⃣', '🍒', '💎', '🍋', '🍇', '🔔', '⭐', '🍀', '🍊', '💰'];
    function spinCasino() {
        const slots = document.querySelectorAll('#slotContainer .slot-tg');
        const re = document.getElementById('slotResult');
        re.textContent = '';
        re.className = 'slot-result';
        slots.forEach(s => { s.querySelector('span').textContent = '🎰'; s.classList.add('spinning'); });
        addCoins(2);
        setTimeout(() => {
            const jc = Math.random();
            let r1, r2, r3;
            if (jc < 0.1) {
                const ji = SI[Math.floor(Math.random() * SI.length)];
                r1 = r2 = r3 = ji;
            } else if (jc < 0.25) {
                const i = SI[Math.floor(Math.random() * SI.length)];
                r1 = i; r2 = i;
                do { r3 = SI[Math.floor(Math.random() * SI.length)]; } while (r3 === i);
            } else {
                r1 = SI[Math.floor(Math.random() * SI.length)];
                r2 = SI[Math.floor(Math.random() * SI.length)];
                r3 = SI[Math.floor(Math.random() * SI.length)];
            }
            slots[0].querySelector('span').textContent = r1;
            slots[1].querySelector('span').textContent = r2;
            slots[2].querySelector('span').textContent = r3;
            slots.forEach(s => s.classList.remove('spinning'));
            if (r1 === r2 && r2 === r3) {
                re.textContent = '🎉 ДЖЕКПОТ! 🎉';
                re.className = 'slot-result slot-win';
                addCoins(20);
                sp('#ffb800', '#ffd700');
            } else if (r1 === r2 || r2 === r3 || r1 === r3) {
                re.textContent = 'Почти! Два совпало! ✨';
                addCoins(5);
            } else {
                re.textContent = 'Попробуй ещё! 🍀';
            }
        }, 800);
    }

    // ===== БАСКЕТБОЛ =====
    function shootBasket() {
        const e = document.getElementById('basketEmoji');
        const s = document.getElementById('basketScore');
        e.classList.add('shooting');
        s.textContent = '...';
        setTimeout(() => {
            e.classList.remove('shooting');
            if (Math.random() < 0.6) {
                s.textContent = '🎯 Попадание!';
                addCoins(3);
                sp('#ff8c00', '#ffa500');
            } else { s.textContent = '😅 Мимо...'; }
        }, 700);
    }

    // ===== ФУТБОЛ =====
    function kickFootball() {
        const e = document.getElementById('footballEmoji');
        const s = document.getElementById('footballScore');
        e.classList.add('kicking');
        s.textContent = '...';
        s.className = 'sport-score';
        setTimeout(() => {
            e.classList.remove('kicking');
            if (Math.random() < 0.5) {
                s.textContent = '⚽🥅 ГОООЛ!';
                s.className = 'sport-score goal-text';
                addCoins(5);
                sp('#4ade80', '#22c55e');
            } else { s.textContent = '😅 Мимо...'; s.className = 'sport-score'; }
        }, 600);
    }

    // ===== БОУЛИНГ =====
    function rollBowling() {
        const e = document.getElementById('bowlingEmoji');
        const s = document.getElementById('bowlingScore');
        e.classList.add('rolling');
        s.textContent = '...';
        setTimeout(() => {
            e.classList.remove('rolling');
            if (Math.random() < 0.4) {
                s.textContent = '🎳 СТРАЙК!';
                addCoins(5);
                sp('#fbbf24', '#f59e0b');
            } else { s.textContent = `Сбито: ${Math.floor(Math.random() * 8) + 1} кеглей`; }
        }, 800);
    }

    // ===== ДАРТС =====
    function throwDarts() {
        const e = document.getElementById('dartsEmoji');
        const s = document.getElementById('dartsScore');
        e.classList.add('throwing');
        s.textContent = '...';
        setTimeout(() => {
            e.classList.remove('throwing');
            const pts = [5, 10, 15, 20, 25, 50, 100];
            const r = pts[Math.floor(Math.random() * pts.length)];
            if (r >= 50) {
                s.textContent = `🎯 ${r} очков!`;
                addCoins(4);
                sp('#f87171', '#ef4444');
            } else { s.textContent = `${r} очков`; }
        }, 500);
    }

    // ===== ВКЛАДКИ =====
    const pages = ['fire', 'dice', 'casino', 'basket', 'football', 'bowling', 'darts'];
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', pages[i] === tab));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        ['Fire', 'Dice', 'Casino', 'Basket', 'Football', 'Bowling', 'Darts'].forEach(n => document.getElementById('bottom' + n).style.display = 'none');
        const m = { fire: 'Fire', dice: 'Dice', casino: 'Casino', basket: 'Basket', football: 'Football', bowling: 'Bowling', darts: 'Darts' };
        document.getElementById('bottom' + m[tab]).style.display = '';
    }

    // ===== ОБЩЕЕ =====
    function sp(c1, c2) {
        const co = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = (30 + Math.random() * 40) + '%';
            p.style.bottom = '30%';
            p.style.animationDelay = Math.random() * 0.4 + 's';
            p.style.animationDuration = (1 + Math.random() * 2) + 's';
            p.style.background = Math.random() > 0.5 ? c1 : c2;
            co.appendChild(p);
            setTimeout(() => p.remove(), 2000);
        }
    }
    function st(m, f) {
        const t = document.getElementById('toast');
        t.textContent = m;
        t.className = 'toast' + (f ? ' fire-toast' : '');
        t.classList.add('show');
        clearTimeout(t._timeout);
        t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ===== ЗАПУСК =====
    loadCoins();
    loadStreak();
    updateFireUI();
    rd();

    function scheduleMidnight() {
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        setTimeout(() => {
            // Проверяем streak на полночь
            if (streak.lastPressDate && streak.lastPressDate !== getToday()) {
                const yesterday = getYesterday();
                if (streak.lastPressDate !== yesterday) {
                    streak.count = 0;
                    streak.lastPressDate = null;
                }
            }
            saveStreak();
            updateFireUI();
            scheduleMidnight();
        }, midnight - now + 1000);
    }
    scheduleMidnight();
</script>
</body>
</html>
