<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Общий огонь</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .particles {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #ff4500;
            border-radius: 50%;
            animation: floatUp 2s ease-out forwards;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }
        .container {
            position: relative; z-index: 1;
            text-align: center; padding: 20px;
        }
        .fire-emoji {
            font-size: 120px; display: block;
            animation: pulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px #ff4500) drop-shadow(0 0 60px #ff6347);
        }
        .fire-emoji.dead {
            animation: none;
            filter: grayscale(1) brightness(0.4);
            transform: scale(0.8);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .streak-count {
            font-size: 72px; font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px #ff4500, 0 0 80px #ff6347;
            margin: 10px 0;
        }
        .streak-label {
            font-size: 14px; color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .partners {
            font-size: 13px; color: #777;
            margin-bottom: 16px;
        }
        .partners span {
            color: #ff6347; font-weight: 600;
        }
        .btn {
            display: inline-block;
            padding: 16px 50px;
            font-size: 18px; font-weight: 700;
            border: none; border-radius: 50px;
            cursor: pointer; letter-spacing: 1px;
            transition: all 0.2s; margin-top: 20px;
            position: relative; overflow: hidden;
        }
        .btn-active {
            background: linear-gradient(135deg, #ff4500, #ff6347);
            color: #fff;
            box-shadow: 0 8px 30px rgba(255,69,0,0.4);
        }
        .btn-active:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255,69,0,0.3);
        }
        .btn-disabled {
            background: #333; color: #666;
            cursor: not-allowed;
        }
        .toast {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222; color: #fff;
            padding: 12px 24px; border-radius: 25px;
            font-size: 14px; z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.fire-toast { background: #ff4500; color: #fff; font-weight: 600; }
        .info-text { color: #666; font-size: 12px; margin-top: 16px; }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container">
    <span class="fire-emoji" id="fireEmoji">🔥</span>
    <div class="streak-label">Общий огонь • дней подряд</div>
    <div class="streak-count" id="streakCount">0</div>
    <div class="partners">
        Участники: <span id="partnersList">...</span>
    </div>
    <button class="btn btn-active" id="mainBtn" onclick="handlePress()">
        🔥 Поддержать огонь
    </button>
    <p class="info-text" id="infoText"></p>
</div>
<div class="toast" id="toast"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Ключ для Cloud Storage
    const CLOUD_KEY = 'shared_fire_streak';

    // Локальные данные (для быстрого отображения)
    let localStreak = {
        count: 0,
        lastPressDate: null,
        partners: [] // [{id, first_name, lastPressDate}]
    };

    // Текущий пользователь
    const currentUser = tg.initDataUnsafe?.user || { id: 0, first_name: 'Я' };

    // Загрузка данных из облака
    async function loadCloudData() {
        try {
            const result = await tg.CloudStorage.getItem(CLOUD_KEY);
            if (result) {
                localStreak = JSON.parse(result);
            } else {
                localStreak = { count: 0, lastPressDate: null, partners: [] };
            }
        } catch (e) {
            console.log('Ошибка загрузки из облака:', e);
            localStreak = { count: 0, lastPressDate: null, partners: [] };
        }

        // Проверяем, не пропущен ли день
        checkGlobalStreak();

        // Регистрируем текущего пользователя, если его нет
        registerCurrentUser();

        await saveCloudData();
        updateUI();
    }

    // Сохранение в облако
    async function saveCloudData() {
        try {
            await tg.CloudStorage.setItem(CLOUD_KEY, JSON.stringify(localStreak));
        } catch (e) {
            console.log('Ошибка сохранения в облако:', e);
        }
    }

    // Проверка — не пропущен ли день всей командой
    function checkGlobalStreak() {
        const today = getToday();
        const globalLastDate = localStreak.lastPressDate;

        if (!globalLastDate) return;

        if (globalLastDate === today) return;

        const yesterday = getYesterday();
        if (globalLastDate === yesterday) return;

        // Пропустили день всей командой — сброс
        localStreak.count = 0;
        localStreak.lastPressDate = null;
        localStreak.partners.forEach(p => p.lastPressDate = null);
    }

    // Регистрация пользователя
    function registerCurrentUser() {
        const exists = localStreak.partners.find(p => p.id === currentUser.id);
        if (!exists) {
            localStreak.partners.push({
                id: currentUser.id,
                first_name: currentUser.first_name || 'Друг',
                lastPressDate: null
            });
        }
    }

    // Может ли текущий пользователь нажать сегодня
    function canPressToday() {
        const partner = localStreak.partners.find(p => p.id === currentUser.id);
        if (!partner) return true;
        return partner.lastPressDate !== getToday();
    }

    // Кто уже нажал сегодня
    function getPressedToday() {
        const today = getToday();
        return localStreak.partners.filter(p => p.lastPressDate === today);
    }

    // Кто ещё не нажал
    function getNotPressedToday() {
        const today = getToday();
        return localStreak.partners.filter(p => p.lastPressDate !== today);
    }

    // Обработка нажатия
    async function handlePress() {
        if (!canPressToday()) {
            const pressed = getPressedToday();
            const names = pressed.map(p => p.first_name).join(', ');
            showToast(`${names} уже поддержал(и) огонь сегодня!`, false);
            shakeFire();
            return;
        }

        // Отмечаем, что текущий пользователь нажал
        const partner = localStreak.partners.find(p => p.id === currentUser.id);
        if (partner) {
            partner.lastPressDate = getToday();
        }

        // Проверяем — все ли нажали сегодня
        const notPressed = getNotPressedToday();

        if (notPressed.length === 0) {
            // Все нажали — увеличиваем счётчик!
            localStreak.count++;
            localStreak.lastPressDate = getToday();
            localStreak.partners.forEach(p => p.lastPressDate = getToday());

            await saveCloudData();
            spawnParticles();
            showToast('Все поддержали огонь! +1 день 🔥', true);
        } else {
            // Кто-то ещё не нажал
            const names = notPressed.map(p => p.first_name).join(', ');
            await saveCloudData();
            showToast(`Ты нажал! Ждём: ${names}`, false);
        }

        updateUI();
    }

    // Обновление интерфейса
    function updateUI() {
        const countEl = document.getElementById('streakCount');
        const fireEl = document.getElementById('fireEmoji');
        const btn = document.getElementById('mainBtn');
        const infoText = document.getElementById('infoText');
        const partnersList = document.getElementById('partnersList');

        countEl.textContent = localStreak.count;

        // Огонь
        if (localStreak.count === 0) {
            fireEl.className = 'fire-emoji dead';
            infoText.textContent = 'Нажми, чтобы зажечь общий огонь!';
        } else if (localStreak.count >= 30) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '💥';
            infoText.textContent = 'Легендарный общий огонь!';
        } else if (localStreak.count >= 7) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '🔥';
            infoText.textContent = 'Общий огонь всё сильнее!';
        } else {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '🔥';
        }

        // Участники
        const pressed = getPressedToday();
        const notPressed = getNotPressedToday();

        let partsStr = '';
        if (pressed.length > 0) {
            partsStr += '✅ ' + pressed.map(p => p.first_name).join(', ');
        }
        if (notPressed.length > 0) {
            if (partsStr) partsStr += ' | ';
            partsStr += '⏳ ' + notPressed.map(p => p.first_name).join(', ');
        }
        partnersList.textContent = partsStr || 'Никого нет';

        // Кнопка
        if (canPressToday()) {
            btn.className = 'btn btn-active';
            btn.textContent = localStreak.count === 0 ? '🔥 Зажечь огонь!' : '🔥 Поддержать огонь';
            btn.disabled = false;
            if (localStreak.count > 0) {
                infoText.textContent = 'Поддержи огонь сегодня!';
            }
        } else {
            btn.className = 'btn btn-disabled';
            btn.textContent = '✅ Ты уже нажал';
            btn.disabled = true;
            const notPressed = getNotPressedToday();
            if (notPressed.length > 0) {
                infoText.textContent = 'Ждём: ' + notPressed.map(p => p.first_name).join(', ');
            } else {
                infoText.textContent = 'Все нажали! Возвращайтесь завтра';
            }
        }
    }

    // Вспомогательные функции
    function getToday() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getYesterday() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function shakeFire() {
        const el = document.getElementById('fireEmoji');
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'pulse 0.3s ease-in-out 3';
        setTimeout(() => { el.style.animation = 'pulse 1.5s ease-in-out infinite'; }, 900);
    }

    function spawnParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = (20 + Math.random() * 60) + '%';
            particle.style.bottom = '20%';
            particle.style.animationDelay = Math.random() * 0.5 + 's';
            particle.style.animationDuration = (1.5 + Math.random() * 3) + 's';
            particle.style.width = (2 + Math.random() * 6) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = Math.random() > 0.5 ? '#ff4500' : '#ffa500';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 3000);
        }
    }

    function showToast(message, isFire) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isFire ? ' fire-toast' : '');
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    // Автообновление и синхронизация
    async function syncLoop() {
        try {
            const result = await tg.CloudStorage.getItem(CLOUD_KEY);
            if (result) {
                const cloudData = JSON.parse(result);
                // Проверяем, не изменились ли данные
                if (JSON.stringify(cloudData) !== JSON.stringify(localStreak)) {
                    localStreak = cloudData;
                    checkGlobalStreak();
                    registerCurrentUser();
                    await saveCloudData();
                    updateUI();
                }
            }
        } catch (e) {}

        // Проверка в полночь
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        const msUntilMidnight = midnight - now;

        setTimeout(() => {
            checkGlobalStreak();
            saveCloudData();
            updateUI();
            syncLoop();
        }, Math.min(msUntilMidnight + 1000, 30000)); // проверяем не реже чем раз в 30 секунд
    }

    // Запуск
    loadCloudData().then(() => {
        syncLoop();
    });
</script>
</body>
</html>
