<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Огонёк</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --fire-color: #ff4500;
            --fire-color2: #ff6347;
            --fire-glow: #ff4500;
        }

        .top-panel {
            padding: 12px 16px;
            flex-shrink: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .selector-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .selector-row select {
            flex: 1;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            min-width: 0;
        }
        .btn-icon {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-delete-chat {
            border-color: #ff5252;
            color: #ff5252;
        }
        .new-chat-btn {
            background: none;
            border: 1px dashed #555;
            color: #888;
            padding: 8px;
            border-radius: 10px;
            width: 100%;
            font-size: 13px;
            cursor: pointer;
        }

        .color-panel {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        .color-panel.hidden { display: none; }
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .color-option:active { transform: scale(0.9); }
        .color-option.active {
            border-color: #fff;
            box-shadow: 0 0 12px currentColor;
        }
        .color-option.fire-red { background: #ff4500; color: #ff4500; }
        .color-option.fire-blue { background: #4a9eff; color: #4a9eff; }
        .color-option.fire-purple { background: #b44aff; color: #b44aff; }
        .color-option.fire-green { background: #4aff7e; color: #4aff7e; }
        .color-option.fire-pink { background: #ff4a9e; color: #ff4a9e; }
        .color-option.fire-gold { background: #ffb800; color: #ffb800; }
        .color-option.fire-white { background: #ffffff; color: #ffffff; }
        .color-option.fire-cyan { background: #00e5ff; color: #00e5ff; }

        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            z-index: 1;
            min-height: 0;
        }
        .fire-emoji {
            font-size: 90px;
            display: block;
            animation: pulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--fire-glow)) drop-shadow(0 0 60px var(--fire-color));
            transition: filter 0.3s;
        }
        .fire-emoji.dead {
            animation: none;
            filter: grayscale(1) brightness(0.4);
            transform: scale(0.8);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .streak-count {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px var(--fire-glow), 0 0 80px var(--fire-color);
            margin: 8px 0;
            line-height: 1;
            transition: text-shadow 0.3s;
        }
        .streak-label {
            font-size: 13px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .mode-badge {
            display: inline-block;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .mode-solo { background: #1a3a2a; color: #4ade80; }
        .mode-duo { background: #3a1a1a; color: #f87171; }
        .partners {
            font-size: 12px;
            color: #777;
            margin-bottom: 4px;
        }
        .partners span { color: #ff6347; font-weight: 600; }
        .info-text { color: #666; font-size: 11px; margin-top: 6px; }

        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--fire-color);
            border-radius: 50%;
            animation: floatUp 2s ease-out forwards;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }

        .bottom-panel {
            padding: 12px 16px 20px;
            flex-shrink: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-main {
            background: linear-gradient(135deg, var(--fire-color), var(--fire-color2));
            color: #fff;
            box-shadow: 0 8px 30px color-mix(in srgb, var(--fire-color) 40%, transparent);
            transition: all 0.3s;
        }
        .btn-main:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px color-mix(in srgb, var(--fire-color) 30%, transparent);
        }
        .btn-disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-share {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            font-size: 13px;
            padding: 10px;
        }
        .btn-reset {
            background: none;
            border: 1px solid #ff5252;
            color: #ff5252;
            font-size: 13px;
            padding: 10px;
        }

        .toast {
            position: fixed;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.fire-toast { background: var(--fire-color); color: #fff; font-weight: 600; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .modal-box h3 { color: #fff; font-size: 17px; margin-bottom: 8px; }
        .modal-box p { color: #aaa; font-size: 13px; margin-bottom: 20px; line-height: 1.4; }
        .modal-buttons { display: flex; gap: 8px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .modal-cancel { background: #333; color: #fff; }
        .modal-confirm { background: #ff5252; color: #fff; }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- Верх -->
<div class="top-panel">
    <div class="selector-row">
        <button class="btn-icon" id="colorBtn" onclick="toggleColorPanel()" title="Сменить цвет">🎨</button>
        <select id="chatSelect" onchange="switchChat(this.value)">
            <option value="">Выбери огонёк...</option>
        </select>
        <button class="btn-icon btn-delete-chat" id="deleteChatBtn" onclick="deleteChat()" style="display:none;">🗑</button>
    </div>
    <div class="color-panel hidden" id="colorPanel">
        <div class="color-option fire-red active" onclick="setColor('fire-red', '#ff4500', '#ff6347')"></div>
        <div class="color-option fire-blue" onclick="setColor('fire-blue', '#4a9eff', '#6ab4ff')"></div>
        <div class="color-option fire-purple" onclick="setColor('fire-purple', '#b44aff', '#c97aff')"></div>
        <div class="color-option fire-green" onclick="setColor('fire-green', '#4aff7e', '#6aff96')"></div>
        <div class="color-option fire-pink" onclick="setColor('fire-pink', '#ff4a9e', '#ff6ab4')"></div>
        <div class="color-option fire-gold" onclick="setColor('fire-gold', '#ffb800', '#ffc933')"></div>
        <div class="color-option fire-white" onclick="setColor('fire-white', '#ffffff', '#dddddd')"></div>
        <div class="color-option fire-cyan" onclick="setColor('fire-cyan', '#00e5ff', '#33eaff')"></div>
    </div>
    <button class="new-chat-btn" onclick="createNewChat()">+ Создать новый огонёк</button>
</div>

<!-- Центр -->
<div class="center-content">
    <span class="fire-emoji" id="fireEmoji">🔥</span>
    <div class="streak-label" id="streakLabel">выбери чат</div>
    <div class="streak-count" id="streakCount">0</div>
    <div id="modeBadge"></div>
    <div class="partners">
        Участники: <span id="partnersList">...</span>
    </div>
    <p class="info-text" id="infoText"></p>
</div>

<!-- Низ -->
<div class="bottom-panel">
    <button class="btn btn-main" id="mainBtn" onclick="handlePress()">
        🔥 Поддержать огонь
    </button>
    <button class="btn btn-share" id="shareBtn" onclick="shareChat()" style="display:none;">
        📤 Поделиться огоньком
    </button>
    <button class="btn btn-reset" id="resetBtn" onclick="resetStreak()" style="display:none;">
        🔄 Сбросить счётчик
    </button>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay hidden" id="deleteModal">
    <div class="modal-box">
        <h3>🗑 Удалить огонёк?</h3>
        <p id="deleteModalText">Вы уверены? Счётчик и все данные этого огонька будут потеряны навсегда.</p>
        <div class="modal-buttons">
            <button class="modal-cancel" onclick="closeDeleteModal()">Отмена</button>
            <button class="modal-confirm" onclick="confirmDeleteChat()">Удалить</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const STORAGE_KEY = 'fire_chats_data_v3';
    const COLOR_STORAGE_KEY = 'fire_chats_colors';
    const currentUser = tg.initDataUnsafe?.user || { id: 0, first_name: 'Я' };
    const BOT_USERNAME = 'ogonok_druga_bot';

    const COLORS = {
        'fire-red': { main: '#ff4500', second: '#ff6347' },
        'fire-blue': { main: '#4a9eff', second: '#6ab4ff' },
        'fire-purple': { main: '#b44aff', second: '#c97aff' },
        'fire-green': { main: '#4aff7e', second: '#6aff96' },
        'fire-pink': { main: '#ff4a9e', second: '#ff6ab4' },
        'fire-gold': { main: '#ffb800', second: '#ffc933' },
        'fire-white': { main: '#ffffff', second: '#dddddd' },
        'fire-cyan': { main: '#00e5ff', second: '#33eaff' }
    };

    let allChats = {};
    let chatColors = {};
    let activeChatId = null;
    let pendingDeleteChatId = null;
    let colorPanelOpen = false;

    function getToday() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getYesterday() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function generateChatId() {
        return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    }

    function getDefaultChatData(chatName) {
        return { count: 0, lastPressDate: null, partners: [], chatName: chatName || 'Новый огонёк' };
    }

    function loadAllChats() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) { try { allChats = JSON.parse(raw); } catch (e) { allChats = {}; } }

        const colorsRaw = localStorage.getItem(COLOR_STORAGE_KEY);
        if (colorsRaw) { try { chatColors = JSON.parse(colorsRaw); } catch (e) { chatColors = {}; } }

        const startapp = tg.initDataUnsafe?.start_param || '';
        if (startapp) {
            if (!allChats[startapp]) allChats[startapp] = getDefaultChatData('Огонёк');
            activeChatId = startapp;
        }

        Object.keys(allChats).forEach(chatId => {
            allChats[chatId] = checkStreak(allChats[chatId]);
            allChats[chatId] = registerUser(allChats[chatId]);
        });
        saveAllChats();
    }

    function saveAllChats() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allChats));
            localStorage.setItem(COLOR_STORAGE_KEY, JSON.stringify(chatColors));
        } catch (e) {}
    }

    function checkStreak(data) {
        if (!data.lastPressDate) return data;
        const today = getToday();
        if (data.lastPressDate === today) return data;
        const yesterday = getYesterday();
        if (data.lastPressDate === yesterday) return data;
        data.count = 0;
        data.lastPressDate = null;
        data.partners.forEach(p => p.lastPressDate = null);
        return data;
    }

    function registerUser(data) {
        const uniquePartners = [];
        const seenIds = new Set();
        data.partners.forEach(p => { if (!seenIds.has(p.id)) { seenIds.add(p.id); uniquePartners.push(p); } });
        data.partners = uniquePartners;
        const exists = data.partners.find(p => p.id === currentUser.id);
        if (!exists) data.partners.push({ id: currentUser.id, first_name: currentUser.first_name || 'Друг', lastPressDate: null });
        return data;
    }

    function getActiveChat() {
        if (!activeChatId || !allChats[activeChatId]) return null;
        return allChats[activeChatId];
    }

    function getActiveColor() {
        const colorKey = chatColors[activeChatId] || 'fire-red';
        return COLORS[colorKey] || COLORS['fire-red'];
    }

    function isSoloMode() {
        const chat = getActiveChat();
        if (!chat) return true;
        return chat.partners.length <= 1;
    }

    function canPressToday() {
        const chat = getActiveChat();
        if (!chat) return false;
        if (isSoloMode()) return chat.lastPressDate !== getToday();
        const partner = chat.partners.find(p => p.id === currentUser.id);
        if (!partner) return true;
        return partner.lastPressDate !== getToday();
    }

    function getPressedToday() {
        const chat = getActiveChat();
        if (!chat) return [];
        const today = getToday();
        return chat.partners.filter(p => p.lastPressDate === today);
    }

    function getNotPressedToday() {
        const chat = getActiveChat();
        if (!chat) return [];
        const today = getToday();
        return chat.partners.filter(p => p.lastPressDate !== today);
    }

    function applyColor(colorKey) {
        const color = COLORS[colorKey] || COLORS['fire-red'];
        document.documentElement.style.setProperty('--fire-color', color.main);
        document.documentElement.style.setProperty('--fire-color2', color.second);
        document.documentElement.style.setProperty('--fire-glow', color.main);
        document.querySelectorAll('.color-option').forEach(el => el.classList.remove('active'));
        const activeOption = document.querySelector(`.color-option.${colorKey}`);
        if (activeOption) activeOption.classList.add('active');
    }

    function setColor(colorKey, mainColor, secondColor) {
        if (!activeChatId) return;
        chatColors[activeChatId] = colorKey;
        saveAllChats();
        applyColor(colorKey);
        updateUI();
        showToast('Цвет огня изменён! 🎨', false);
    }

    function toggleColorPanel() {
        const panel = document.getElementById('colorPanel');
        colorPanelOpen = !colorPanelOpen;
        if (colorPanelOpen) panel.classList.remove('hidden');
        else panel.classList.add('hidden');
    }

    function switchChat(chatId) {
        activeChatId = chatId || null;
        applyColor(activeChatId ? (chatColors[activeChatId] || 'fire-red') : 'fire-red');
        document.getElementById('colorPanel').classList.add('hidden');
        colorPanelOpen = false;
        updateUI();
    }

    function createNewChat() {
        const chatId = generateChatId();
        const chatName = prompt('Назовите этот огонёк:', 'Огонёк с другом');
        if (!chatName) return;
        allChats[chatId] = getDefaultChatData(chatName);
        allChats[chatId] = registerUser(allChats[chatId]);
        chatColors[chatId] = 'fire-red';
        saveAllChats();
        activeChatId = chatId;
        applyColor('fire-red');
        document.getElementById('colorPanel').classList.add('hidden');
        colorPanelOpen = false;
        updateSelector();
        updateUI();
        showToast('Новый огонёк создан! Отправь ссылку другу 📤', false);
    }

    function shareChat() {
        if (!activeChatId) return;
        const shareUrl = `https://t.me/${BOT_USERNAME}/огонёк?startapp=${activeChatId}`;
        if (tg.openTelegramLink) {
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent('🔥 Давай поддерживать общий огонь!')}`);
        } else {
            navigator.clipboard.writeText(`🔥 Давай поддерживать общий огонь!\n\nОткрывай: ${shareUrl}`).then(() => {
                showToast('Ссылка скопирована! Отправь другу', false);
            });
        }
    }

    function resetStreak() {
        if (!activeChatId) return;
        const chat = getActiveChat();
        if (!chat) return;
        const days = chat.count;
        const message = days > 0 ? `Вы уверены, что хотите сбросить счётчик?\n\nТекущий счётчик: ${days} дн.` : 'Счётчик и так равен нулю. Сбросить данные участников?';
        if (!confirm(message)) return;
        chat.count = 0;
        chat.lastPressDate = null;
        chat.partners.forEach(p => p.lastPressDate = null);
        saveAllChats();
        updateUI();
        showToast('Счётчик сброшен 🔄', false);
    }

    function deleteChat() {
        if (!activeChatId) return;
        const chat = allChats[activeChatId];
        if (!chat) return;
        pendingDeleteChatId = activeChatId;
        document.getElementById('deleteModalText').textContent = `Вы уверены, что хотите удалить огонёк «${chat.chatName}»?\n\nСчётчик (${chat.count} дн.) и все данные будут потеряны навсегда.`;
        document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
        pendingDeleteChatId = null;
        document.getElementById('deleteModal').classList.add('hidden');
    }

    function confirmDeleteChat() {
        if (!pendingDeleteChatId) return;
        const chatName = allChats[pendingDeleteChatId]?.chatName || 'Огонёк';
        delete allChats[pendingDeleteChatId];
        delete chatColors[pendingDeleteChatId];
        if (activeChatId === pendingDeleteChatId) { activeChatId = null; applyColor('fire-red'); }
        pendingDeleteChatId = null;
        saveAllChats();
        document.getElementById('colorPanel').classList.add('hidden');
        colorPanelOpen = false;
        updateUI();
        document.getElementById('deleteModal').classList.add('hidden');
        showToast(`Огонёк «${chatName}» удалён 🗑`, false);
    }

    function handlePress() {
        if (!activeChatId) { showToast('Сначала выбери или создай огонёк!', false); return; }
        const chat = getActiveChat();
        if (!chat) return;
        if (!canPressToday()) {
            if (isSoloMode()) showToast('Ты уже поддерживал огонь сегодня! 🔥', false);
            else { const pressed = getPressedToday(); showToast(`${pressed.map(p => p.first_name).join(', ')} уже поддержал(и) огонь сегодня!`, false); }
            shakeFire();
            return;
        }
        const partner = chat.partners.find(p => p.id === currentUser.id);
        if (partner) partner.lastPressDate = getToday();

        if (isSoloMode()) {
            chat.count++; chat.lastPressDate = getToday();
            chat.partners.forEach(p => p.lastPressDate = getToday());
            saveAllChats(); spawnParticles();
            showToast('Огонь поддерживается! +1 день 🔥', true);
            updateUI(); return;
        }
        const notPressed = getNotPressedToday();
        if (notPressed.length === 0) {
            chat.count++; chat.lastPressDate = getToday();
            chat.partners.forEach(p => p.lastPressDate = getToday());
            saveAllChats(); spawnParticles();
            showToast('Все поддержали огонь! +1 день 🔥', true);
        } else {
            saveAllChats();
            showToast(`Ты нажал! Ждём: ${notPressed.map(p => p.first_name).join(', ')}`, false);
        }
        updateUI();
    }

    function updateSelector() {
        const select = document.getElementById('chatSelect');
        select.innerHTML = '<option value="">Выбери огонёк...</option>';
        Object.keys(allChats).forEach(chatId => {
            const chat = allChats[chatId];
            const option = document.createElement('option');
            option.value = chatId;
            const modeIcon = chat.partners.length <= 1 ? '🧪' : '👥';
            option.textContent = modeIcon + ' ' + chat.chatName + ' (' + chat.count + ' дн.)';
            if (chatId === activeChatId) option.selected = true;
            select.appendChild(option);
        });
        if (activeChatId && !allChats[activeChatId]) activeChatId = null;
    }

    function updateUI() {
        const chat = getActiveChat();
        const fireEl = document.getElementById('fireEmoji');
        const countEl = document.getElementById('streakCount');
        const labelEl = document.getElementById('streakLabel');
        const partnersList = document.getElementById('partnersList');
        const btn = document.getElementById('mainBtn');
        const infoText = document.getElementById('infoText');
        const shareBtn = document.getElementById('shareBtn');
        const resetBtn = document.getElementById('resetBtn');
        const deleteBtn = document.getElementById('deleteChatBtn');
        const modeBadge = document.getElementById('modeBadge');

        updateSelector();

        if (!chat) {
            fireEl.className = 'fire-emoji dead'; fireEl.textContent = '🔥';
            countEl.textContent = '0'; labelEl.textContent = 'выбери чат';
            partnersList.textContent = '...';
            btn.className = 'btn btn-disabled'; btn.textContent = '🔥 Выбери огонёк'; btn.disabled = true;
            infoText.textContent = 'Создай или выбери огонёк';
            shareBtn.style.display = 'none'; resetBtn.style.display = 'none'; deleteBtn.style.display = 'none';
            modeBadge.innerHTML = '';
            return;
        }

        countEl.textContent = chat.count;
        labelEl.textContent = chat.chatName + ' • дней подряд';
        shareBtn.style.display = 'block'; resetBtn.style.display = 'block'; deleteBtn.style.display = 'flex';

        if (isSoloMode()) modeBadge.innerHTML = '<span class="mode-badge mode-solo">🧪 ТЕСТ / СОЛО</span>';
        else modeBadge.innerHTML = '<span class="mode-badge mode-duo">👥 ПАРНЫЙ РЕЖИМ</span>';

        if (chat.count === 0) { fireEl.className = 'fire-emoji dead'; fireEl.textContent = '🔥'; infoText.textContent = 'Нажми, чтобы зажечь огонь!'; }
        else if (chat.count >= 30) { fireEl.className = 'fire-emoji'; fireEl.textContent = '💥'; infoText.textContent = 'Легендарный огонь!'; }
        else if (chat.count >= 7) { fireEl.className = 'fire-emoji'; fireEl.textContent = '🔥'; infoText.textContent = 'Огонь всё сильнее!'; }
        else { fireEl.className = 'fire-emoji'; fireEl.textContent = '🔥'; }

        const pressed = getPressedToday();
        const notPressed = getNotPressedToday();
        let partsStr = '';
        if (pressed.length > 0) partsStr += '✅ ' + pressed.map(p => p.first_name).join(', ');
        if (notPressed.length > 0) { if (partsStr) partsStr += ' | '; partsStr += '⏳ ' + notPressed.map(p => p.first_name).join(', '); }
        partnersList.textContent = partsStr || (chat.partners.map(p => p.first_name).join(', ') || 'Никого нет');

        if (canPressToday()) {
            btn.className = 'btn btn-main';
            btn.textContent = chat.count === 0 ? '🔥 Зажечь огонь!' : '🔥 Поддержать огонь';
            btn.disabled = false;
        } else {
            btn.className = 'btn btn-disabled'; btn.textContent = '✅ Уже нажал'; btn.disabled = true;
            if (!isSoloMode() && getNotPressedToday().length > 0) infoText.textContent = 'Ждём: ' + getNotPressedToday().map(p => p.first_name).join(', ');
            else if (isSoloMode()) infoText.textContent = 'Возвращайся завтра!';
            else infoText.textContent = 'Все нажали! Возвращайтесь завтра';
        }
    }

    function shakeFire() {
        const el = document.getElementById('fireEmoji');
        el.style.animation = 'none'; el.offsetHeight;
        el.style.animation = 'pulse 0.3s ease-in-out 3';
        setTimeout(() => { el.style.animation = 'pulse 1.5s ease-in-out infinite'; }, 900);
    }

    function spawnParticles() {
        const container = document.getElementById('particles');
        const color = getActiveColor();
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = (20 + Math.random() * 60) + '%';
            particle.style.bottom = '20%';
            particle.style.animationDelay = Math.random() * 0.5 + 's';
            particle.style.animationDuration = (1.5 + Math.random() * 3) + 's';
            particle.style.width = (2 + Math.random() * 6) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = Math.random() > 0.5 ? color.main : color.second;
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 3000);
        }
    }

    function showToast(message, isFire) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isFire ? ' fire-toast' : '');
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    loadAllChats();
    applyColor(activeChatId ? (chatColors[activeChatId] || 'fire-red') : 'fire-red');
    updateUI();

    function scheduleMidnight() {
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        setTimeout(() => {
            Object.keys(allChats).forEach(chatId => { allChats[chatId] = checkStreak(allChats[chatId]); });
            saveAllChats();
            updateUI();
            scheduleMidnight();
        }, midnight - now + 1000);
    }
    scheduleMidnight();
</script>
</body>
</html>
