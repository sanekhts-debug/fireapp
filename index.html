<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Огонёк</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .fire-emoji {
            font-size: 100px;
            display: block;
            animation: pulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px #ff4500) drop-shadow(0 0 60px #ff6347);
        }
        .fire-emoji.dead {
            animation: none;
            filter: grayscale(1) brightness(0.4);
            transform: scale(0.8);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .streak-count {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px #ff4500, 0 0 80px #ff6347;
            margin: 8px 0;
            line-height: 1;
        }
        .streak-label {
            font-size: 16px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #ff4500;
            border-radius: 50%;
            animation: floatUp 2s ease-out forwards;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }
        .bottom-panel {
            padding: 20px 16px 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-fire {
            background: linear-gradient(135deg, #ff4500, #ff6347);
            color: #fff;
            box-shadow: 0 8px 30px rgba(255,69,0,0.4);
        }
        .btn-fire:active {
            transform: scale(0.95);
        }
        .btn-disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .btn-reset {
            background: none;
            border: 1px solid #ff5252;
            color: #ff5252;
            font-size: 14px;
            padding: 12px;
        }
        .toast {
            position: fixed;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 10;
            transition: transform 0.4s;
            text-align: center;
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.fire-toast { background: #ff4500; color: #fff; font-weight: 600; }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="center-content">
    <span class="fire-emoji" id="fireEmoji">🔥</span>
    <div class="streak-label">дней подряд</div>
    <div class="streak-count" id="streakCount">0</div>
    <p class="info-text" id="infoText">Нажми, чтобы зажечь огонь!</p>
</div>

<div class="bottom-panel">
    <button class="btn btn-fire" id="mainBtn" onclick="handlePress()">
        🔥 Зажечь огонь
    </button>
    <button class="btn btn-reset" onclick="resetStreak()">
        🔄 Сбросить счётчик
    </button>
</div>

<div class="toast" id="toast"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const STORAGE_KEY = 'fire_simple_streak';

    let streakData = {
        count: 0,
        lastPressDate: null
    };

    function getToday() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getYesterday() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try { streakData = JSON.parse(raw); } catch (e) { streakData = { count: 0, lastPressDate: null }; }
        }
        checkStreak();
        saveData();
    }

    function saveData() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(streakData));
        } catch (e) {}
    }

    function checkStreak() {
        if (!streakData.lastPressDate) return;
        const today = getToday();
        if (streakData.lastPressDate === today) return;
        const yesterday = getYesterday();
        if (streakData.lastPressDate === yesterday) return;
        // Пропустили день
        streakData.count = 0;
        streakData.lastPressDate = null;
    }

    function canPressToday() {
        return streakData.lastPressDate !== getToday();
    }

    function handlePress() {
        if (!canPressToday()) {
            showToast('Ты уже поддерживал огонь сегодня! 🔥', false);
            shakeFire();
            return;
        }

        streakData.count++;
        streakData.lastPressDate = getToday();
        saveData();
        spawnParticles();
        showToast('+1 день! Огонь горит 🔥', true);
        updateUI();
    }

    function resetStreak() {
        const days = streakData.count;
        const message = days > 0
            ? `Сбросить счётчик (${days} дн.)?`
            : 'Счётчик и так равен нулю';
        if (!confirm(message)) return;
        streakData.count = 0;
        streakData.lastPressDate = null;
        saveData();
        updateUI();
        showToast('Счётчик сброшен 🔄', false);
    }

    function updateUI() {
        const fireEl = document.getElementById('fireEmoji');
        const countEl = document.getElementById('streakCount');
        const btn = document.getElementById('mainBtn');
        const infoText = document.getElementById('infoText');

        countEl.textContent = streakData.count;

        if (streakData.count === 0) {
            fireEl.className = 'fire-emoji dead';
            fireEl.textContent = '🔥';
            infoText.textContent = 'Нажми, чтобы зажечь огонь!';
        } else if (streakData.count >= 100) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '💥';
            infoText.textContent = 'ЭПИЧЕСКИЙ ОГОНЬ!';
        } else if (streakData.count >= 30) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '💥';
            infoText.textContent = 'Легендарный огонь!';
        } else if (streakData.count >= 7) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '🔥';
            infoText.textContent = 'Огонь всё сильнее!';
        } else {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '🔥';
            infoText.textContent = 'Продолжай в том же духе!';
        }

        if (canPressToday()) {
            btn.className = 'btn btn-fire';
            btn.textContent = streakData.count === 0 ? '🔥 Зажечь огонь' : '🔥 Поддержать огонь';
            btn.disabled = false;
        } else {
            btn.className = 'btn btn-disabled';
            btn.textContent = '✅ Сегодня уже есть';
            btn.disabled = true;
            infoText.textContent = 'Возвращайся завтра!';
        }
    }

    function shakeFire() {
        const el = document.getElementById('fireEmoji');
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'pulse 0.3s ease-in-out 3';
        setTimeout(() => { el.style.animation = 'pulse 1.5s ease-in-out infinite'; }, 900);
    }

    function spawnParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = (20 + Math.random() * 60) + '%';
            particle.style.bottom = '20%';
            particle.style.animationDelay = Math.random() * 0.5 + 's';
            particle.style.animationDuration = (1.5 + Math.random() * 3) + 's';
            particle.style.width = (2 + Math.random() * 6) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = Math.random() > 0.5 ? '#ff4500' : '#ffa500';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 3000);
        }
    }

    function showToast(message, isFire) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isFire ? ' fire-toast' : '');
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }

    // Запуск
    loadData();
    updateUI();

    // Обновление в полночь
    function scheduleMidnight() {
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        setTimeout(() => {
            checkStreak();
            saveData();
            updateUI();
            scheduleMidnight();
        }, midnight - now + 1000);
    }
    scheduleMidnight();
</script>
</body>
</html>
