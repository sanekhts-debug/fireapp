<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥 Огонёк</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .top-panel {
            padding: 12px 16px;
            flex-shrink: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .selector-row {
            display: flex;
            gap: 6px;
        }
        .selector-row select {
            flex: 1;
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            min-width: 0;
        }
        .btn-delete-chat {
            background: none;
            border: 1px solid #ff5252;
            color: #ff5252;
            width: 42px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-row {
            display: flex;
            gap: 6px;
        }
        .btn-row button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }
        .btn-create {
            background: #1a3a2a;
            color: #4ade80;
            border: 1px solid #4ade80;
        }
        .btn-join {
            background: #3a1a1a;
            color: #f87171;
            border: 1px solid #f87171;
        }

        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            z-index: 1;
            min-height: 0;
        }
        .fire-emoji {
            font-size: 90px;
            display: block;
            animation: pulse 1.5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px #ff4500) drop-shadow(0 0 60px #ff6347);
        }
        .fire-emoji.dead {
            animation: none;
            filter: grayscale(1) brightness(0.4);
            transform: scale(0.8);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .streak-count {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px #ff4500, 0 0 80px #ff6347;
            margin: 8px 0;
            line-height: 1;
        }
        .streak-label {
            font-size: 13px;
            color: #aaa;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .invite-code {
            font-size: 16px;
            color: #ffb800;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 8px 0;
            background: #1a1a1a;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px dashed #ffb800;
            cursor: pointer;
            display: none;
        }
        .mode-badge {
            display: inline-block;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .mode-solo { background: #1a3a2a; color: #4ade80; }
        .mode-duo { background: #3a1a1a; color: #f87171; }
        .partners {
            font-size: 12px;
            color: #777;
            margin-bottom: 4px;
        }
        .partners span { color: #ff6347; font-weight: 600; }
        .info-text { color: #666; font-size: 11px; margin-top: 6px; }

        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: #ff4500;
            border-radius: 50%;
            animation: floatUp 2s ease-out forwards;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }

        .bottom-panel {
            padding: 12px 16px 20px;
            flex-shrink: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-active {
            background: linear-gradient(135deg, #ff4500, #ff6347);
            color: #fff;
            box-shadow: 0 8px 30px rgba(255,69,0,0.4);
        }
        .btn-active:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255,69,0,0.3);
        }
        .btn-disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .btn-reset {
            background: none;
            border: 1px solid #ff5252;
            color: #ff5252;
            font-size: 13px;
            padding: 10px;
        }

        .toast {
            position: fixed;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-width: 90%;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.fire-toast { background: #ff4500; color: #fff; font-weight: 600; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }
        .modal-box h3 { color: #fff; font-size: 17px; margin-bottom: 8px; }
        .modal-box p { color: #aaa; font-size: 13px; margin-bottom: 20px; line-height: 1.4; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #0a0a0a;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 16px;
            outline: none;
            text-transform: uppercase;
        }
        .modal-buttons { display: flex; gap: 8px; }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .modal-cancel { background: #333; color: #fff; }
        .modal-confirm { background: #ff5252; color: #fff; }
        .modal-join { background: #4ade80; color: #000; }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="top-panel">
    <div class="selector-row">
        <select id="chatSelect" onchange="switchChat(this.value)">
            <option value="">Выбери огонёк...</option>
        </select>
        <button class="btn-delete-chat" id="deleteChatBtn" onclick="deleteChat()" style="display:none;">🗑</button>
    </div>
    <div class="btn-row">
        <button class="btn-create" onclick="createNewChat()">+ Создать новый</button>
        <button class="btn-join" onclick="showJoinModal()">🔗 Присоединиться</button>
    </div>
</div>

<div class="center-content">
    <span class="fire-emoji" id="fireEmoji">🔥</span>
    <div class="streak-label" id="streakLabel">выбери чат</div>
    <div class="streak-count" id="streakCount">0</div>
    <div class="invite-code" id="inviteCode" onclick="copyCode()">Код: ...</div>
    <div id="modeBadge"></div>
    <div class="partners">
        Участники: <span id="partnersList">...</span>
    </div>
    <p class="info-text" id="infoText"></p>
</div>

<div class="bottom-panel">
    <button class="btn btn-active" id="mainBtn" onclick="handlePress()">
        🔥 Поддержать огонь
    </button>
    <button class="btn btn-reset" id="resetBtn" onclick="resetStreak()" style="display:none;">
        🔄 Сбросить счётчик
    </button>
</div>

<div class="toast" id="toast"></div>

<!-- Модальное окно удаления -->
<div class="modal-overlay hidden" id="deleteModal">
    <div class="modal-box">
        <h3>🗑 Удалить огонёк?</h3>
        <p id="deleteModalText"></p>
        <div class="modal-buttons">
            <button class="modal-cancel" onclick="closeDeleteModal()">Отмена</button>
            <button class="modal-confirm" onclick="confirmDeleteChat()">Удалить</button>
        </div>
    </div>
</div>

<!-- Модальное окно присоединения -->
<div class="modal-overlay hidden" id="joinModal">
    <div class="modal-box">
        <h3>🔗 Присоединиться к огоньку</h3>
        <p>Введи код, который прислал друг:</p>
        <input type="text" id="joinCodeInput" placeholder="Например: ABC123" maxlength="6" autocomplete="off">
        <div class="modal-buttons">
            <button class="modal-cancel" onclick="closeJoinModal()">Отмена</button>
            <button class="modal-join" onclick="joinChat()">Присоединиться</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const STORAGE_KEY = 'fire_chats_data_v2';
    const CODES_KEY = 'fire_chats_codes';
    const currentUser = tg.initDataUnsafe?.user || { id: 0, first_name: 'Я' };

    let allChats = {};
    let chatCodes = {}; // { code: chatId }
    let activeChatId = null;
    let pendingDeleteChatId = null;

    function getToday() {
        const d = new Date();
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getYesterday() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function generateCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        // Проверяем, что код уникален
        if (chatCodes[code]) return generateCode();
        return code;
    }

    function generateChatId() {
        return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    }

    function getDefaultChatData(chatName, code) {
        return {
            count: 0,
            lastPressDate: null,
            partners: [],
            chatName: chatName || 'Новый огонёк',
            code: code || ''
        };
    }

    function loadAllChats() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try { allChats = JSON.parse(raw); } catch (e) { allChats = {}; }
        }

        const codesRaw = localStorage.getItem(CODES_KEY);
        if (codesRaw) {
            try { chatCodes = JSON.parse(codesRaw); } catch (e) { chatCodes = {}; }
        }

        // Пробуем загрузить по startapp (для обратной совместимости)
        const startapp = tg.initDataUnsafe?.start_param || '';
        if (startapp) {
            // Проверяем, может это код?
            if (chatCodes[startapp]) {
                activeChatId = chatCodes[startapp];
            } else if (allChats[startapp]) {
                activeChatId = startapp;
            }
        }

        Object.keys(allChats).forEach(chatId => {
            allChats[chatId] = checkStreak(allChats[chatId]);
            allChats[chatId] = registerUser(allChats[chatId]);
        });

        saveAllChats();
    }

    function saveAllChats() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(allChats));
            localStorage.setItem(CODES_KEY, JSON.stringify(chatCodes));
        } catch (e) {
            console.log('Ошибка сохранения:', e);
        }
    }

    function checkStreak(data) {
        if (!data.lastPressDate) return data;
        const today = getToday();
        if (data.lastPressDate === today) return data;
        const yesterday = getYesterday();
        if (data.lastPressDate === yesterday) return data;
        data.count = 0;
        data.lastPressDate = null;
        data.partners.forEach(p => p.lastPressDate = null);
        return data;
    }

    function registerUser(data) {
        const uniquePartners = [];
        const seenIds = new Set();
        data.partners.forEach(p => {
            if (!seenIds.has(p.id)) {
                seenIds.add(p.id);
                uniquePartners.push(p);
            }
        });
        data.partners = uniquePartners;

        const exists = data.partners.find(p => p.id === currentUser.id);
        if (!exists) {
            data.partners.push({
                id: currentUser.id,
                first_name: currentUser.first_name || 'Друг',
                lastPressDate: null
            });
        }
        return data;
    }

    function getActiveChat() {
        if (!activeChatId || !allChats[activeChatId]) return null;
        return allChats[activeChatId];
    }

    function isSoloMode() {
        const chat = getActiveChat();
        if (!chat) return true;
        return chat.partners.length <= 1;
    }

    function canPressToday() {
        const chat = getActiveChat();
        if (!chat) return false;
        if (isSoloMode()) return chat.lastPressDate !== getToday();
        const partner = chat.partners.find(p => p.id === currentUser.id);
        if (!partner) return true;
        return partner.lastPressDate !== getToday();
    }

    function getPressedToday() {
        const chat = getActiveChat();
        if (!chat) return [];
        const today = getToday();
        return chat.partners.filter(p => p.lastPressDate === today);
    }

    function getNotPressedToday() {
        const chat = getActiveChat();
        if (!chat) return [];
        const today = getToday();
        return chat.partners.filter(p => p.lastPressDate !== today);
    }

    function switchChat(chatId) {
        activeChatId = chatId || null;
        updateUI();
    }

    function createNewChat() {
        const chatId = generateChatId();
        const code = generateCode();
        const chatName = prompt('Назовите этот огонёк:', 'Огонёк с другом');
        if (!chatName) return;

        allChats[chatId] = getDefaultChatData(chatName, code);
        allChats[chatId] = registerUser(allChats[chatId]);
        chatCodes[code] = chatId;
        saveAllChats();
        activeChatId = chatId;
        updateSelector();
        updateUI();
        showToast('Огонёк создан! Отправь код другу 📤', false);
    }

    function showJoinModal() {
        document.getElementById('joinModal').classList.remove('hidden');
        document.getElementById('joinCodeInput').value = '';
        setTimeout(() => document.getElementById('joinCodeInput').focus(), 300);
    }

    function closeJoinModal() {
        document.getElementById('joinModal').classList.add('hidden');
    }

    function joinChat() {
        const input = document.getElementById('joinCodeInput');
        const code = input.value.trim().toUpperCase();

        if (!code) {
            showToast('Введи код!', false);
            return;
        }

        const chatId = chatCodes[code];

        if (!chatId) {
            showToast('Огонёк с таким кодом не найден 😔', false);
            return;
        }

        if (!allChats[chatId]) {
            showToast('Огонёк не найден 😔', false);
            return;
        }

        // Проверяем, не присоединён ли уже
        if (activeChatId === chatId) {
            showToast('Ты уже в этом огоньке!', false);
            closeJoinModal();
            return;
        }

        // Присоединяемся
        allChats[chatId] = registerUser(allChats[chatId]);
        activeChatId = chatId;
        saveAllChats();
        updateSelector();
        updateUI();
        closeJoinModal();
        showToast('Ты присоединился к огоньку! 🔥', true);
    }

    function copyCode() {
        const chat = getActiveChat();
        if (!chat || !chat.code) return;
        navigator.clipboard.writeText(chat.code).then(() => {
            showToast('Код скопирован! Отправь другу 📤', false);
        });
    }

    function resetStreak() {
        if (!activeChatId) return;
        const chat = getActiveChat();
        if (!chat) return;
        const days = chat.count;
        const message = days > 0
            ? `Вы уверены, что хотите сбросить счётчик?\n\nТекущий счётчик: ${days} дн.`
            : 'Счётчик и так равен нулю. Сбросить данные участников?';
        if (!confirm(message)) return;
        chat.count = 0;
        chat.lastPressDate = null;
        chat.partners.forEach(p => p.lastPressDate = null);
        saveAllChats();
        updateUI();
        showToast('Счётчик сброшен 🔄', false);
    }

    function deleteChat() {
        if (!activeChatId) return;
        const chat = allChats[activeChatId];
        if (!chat) return;
        pendingDeleteChatId = activeChatId;
        document.getElementById('deleteModalText').textContent =
            `Вы уверены, что хотите удалить огонёк «${chat.chatName}»?\n\nСчётчик (${chat.count} дн.) и все данные будут потеряны навсегда.`;
        document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
        pendingDeleteChatId = null;
        document.getElementById('deleteModal').classList.add('hidden');
    }

    function confirmDeleteChat() {
        if (!pendingDeleteChatId) return;
        const chat = allChats[pendingDeleteChatId];
        const chatName = chat?.chatName || 'Огонёк';
        if (chat?.code) delete chatCodes[chat.code];
        delete allChats[pendingDeleteChatId];
        if (activeChatId === pendingDeleteChatId) activeChatId = null;
        pendingDeleteChatId = null;
        saveAllChats();
        updateUI();
        document.getElementById('deleteModal').classList.add('hidden');
        showToast(`Огонёк «${chatName}» удалён 🗑`, false);
    }

    function handlePress() {
        if (!activeChatId) {
            showToast('Сначала выбери или создай огонёк!', false);
            return;
        }
        const chat = getActiveChat();
        if (!chat) return;
        if (!canPressToday()) {
            if (isSoloMode()) {
                showToast('Ты уже поддерживал огонь сегодня! 🔥', false);
            } else {
                const pressed = getPressedToday();
                const names = pressed.map(p => p.first_name).join(', ');
                showToast(`${names} уже поддержал(и) огонь сегодня!`, false);
            }
            shakeFire();
            return;
        }
        const partner = chat.partners.find(p => p.id === currentUser.id);
        if (partner) partner.lastPressDate = getToday();

        if (isSoloMode()) {
            chat.count++;
            chat.lastPressDate = getToday();
            chat.partners.forEach(p => p.lastPressDate = getToday());
            saveAllChats();
            spawnParticles();
            showToast('Огонь поддерживается! +1 день 🔥', true);
            updateUI();
            return;
        }
        const notPressed = getNotPressedToday();
        if (notPressed.length === 0) {
            chat.count++;
            chat.lastPressDate = getToday();
            chat.partners.forEach(p => p.lastPressDate = getToday());
            saveAllChats();
            spawnParticles();
            showToast('Все поддержали огонь! +1 день 🔥', true);
        } else {
            const names = notPressed.map(p => p.first_name).join(', ');
            saveAllChats();
            showToast(`Ты нажал! Ждём: ${names}`, false);
        }
        updateUI();
    }

    function updateSelector() {
        const select = document.getElementById('chatSelect');
        select.innerHTML = '<option value="">Выбери огонёк...</option>';
        Object.keys(allChats).forEach(chatId => {
            const chat = allChats[chatId];
            const option = document.createElement('option');
            option.value = chatId;
            const modeIcon = chat.partners.length <= 1 ? '🧪' : '👥';
            option.textContent = modeIcon + ' ' + chat.chatName + ' (' + chat.count + ' дн.)';
            if (chatId === activeChatId) option.selected = true;
            select.appendChild(option);
        });
        if (activeChatId && !allChats[activeChatId]) activeChatId = null;
    }

    function updateUI() {
        const chat = getActiveChat();
        const fireEl = document.getElementById('fireEmoji');
        const countEl = document.getElementById('streakCount');
        const labelEl = document.getElementById('streakLabel');
        const partnersList = document.getElementById('partnersList');
        const btn = document.getElementById('mainBtn');
        const infoText = document.getElementById('infoText');
        const resetBtn = document.getElementById('resetBtn');
        const deleteBtn = document.getElementById('deleteChatBtn');
        const modeBadge = document.getElementById('modeBadge');
        const inviteCode = document.getElementById('inviteCode');

        updateSelector();

        if (!chat) {
            fireEl.className = 'fire-emoji dead';
            fireEl.textContent = '🔥';
            countEl.textContent = '0';
            labelEl.textContent = 'выбери чат';
            partnersList.textContent = '...';
            btn.className = 'btn btn-active';
            btn.textContent = '🔥 Создать огонёк';
            btn.disabled = false;
            infoText.textContent = 'Создай новый или присоединись по коду';
            resetBtn.style.display = 'none';
            deleteBtn.style.display = 'none';
            modeBadge.innerHTML = '';
            inviteCode.style.display = 'none';
            return;
        }

        countEl.textContent = chat.count;
        labelEl.textContent = chat.chatName + ' • дней подряд';
        resetBtn.style.display = 'block';
        deleteBtn.style.display = 'flex';

        // Показываем код
        if (chat.code) {
            inviteCode.textContent = 'Код: ' + chat.code;
            inviteCode.style.display = 'block';
        } else {
            inviteCode.style.display = 'none';
        }

        if (isSoloMode()) {
            modeBadge.innerHTML = '<span class="mode-badge mode-solo">🧪 СОЛО</span>';
            if (chat.code) {
                infoText.textContent = 'Отправь код другу, чтобы он присоединился';
            }
        } else {
            modeBadge.innerHTML = '<span class="mode-badge mode-duo">👥 ПАРНЫЙ РЕЖИМ</span>';
        }

        if (chat.count === 0) {
            fireEl.className = 'fire-emoji dead';
            fireEl.textContent = '🔥';
            infoText.textContent = isSoloMode() ? 'Нажми, чтобы зажечь огонь!' : infoText.textContent;
        } else if (chat.count >= 30) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '💥';
            infoText.textContent = 'Легендарный огонь!';
        } else if (chat.count >= 7) {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '🔥';
            infoText.textContent = 'Огонь всё сильнее!';
        } else {
            fireEl.className = 'fire-emoji';
            fireEl.textContent = '🔥';
        }

        const pressed = getPressedToday();
        const notPressed = getNotPressedToday();
        let partsStr = '';
        if (pressed.length > 0) partsStr += '✅ ' + pressed.map(p => p.first_name).join(', ');
        if (notPressed.length > 0) {
            if (partsStr) partsStr += ' | ';
            partsStr += '⏳ ' + notPressed.map(p => p.first_name).join(', ');
        }
        partnersList.textContent = partsStr || (chat.partners.map(p => p.first_name).join(', ') || 'Никого нет');

        if (canPressToday()) {
            btn.className = 'btn btn-active';
            btn.textContent = chat.count === 0 ? '🔥 Зажечь огонь!' : '🔥 Поддержать огонь';
            btn.disabled = false;
        } else {
            btn.className = 'btn btn-disabled';
            btn.textContent = '✅ Уже нажал';
            btn.disabled = true;
            if (!isSoloMode() && getNotPressedToday().length > 0) {
                infoText.textContent = 'Ждём: ' + getNotPressedToday().map(p => p.first_name).join(', ');
            } else if (isSoloMode()) {
                infoText.textContent = 'Возвращайся завтра!';
            } else {
                infoText.textContent = 'Все нажали! Возвращайтесь завтра';
            }
        }
    }

    function shakeFire() {
        const el = document.getElementById('fireEmoji');
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = 'pulse 0.3s ease-in-out 3';
        setTimeout(() => { el.style.animation = 'pulse 1.5s ease-in-out infinite'; }, 900);
    }

    function spawnParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = (20 + Math.random() * 60) + '%';
            particle.style.bottom = '20%';
            particle.style.animationDelay = Math.random() * 0.5 + 's';
            particle.style.animationDuration = (1.5 + Math.random() * 3) + 's';
            particle.style.width = (2 + Math.random() * 6) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = Math.random() > 0.5 ? '#ff4500' : '#ffa500';
            container.appendChild(particle);
            setTimeout(() => particle.remove(), 3000);
        }
    }

    function showToast(message, isFire) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast' + (isFire ? ' fire-toast' : '');
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
    }

    loadAllChats();
    updateUI();

    function scheduleMidnight() {
        const now = new Date();
        const midnight = new Date(now);
        midnight.setHours(24, 0, 0, 0);
        setTimeout(() => {
            Object.keys(allChats).forEach(chatId => {
                allChats[chatId] = checkStreak(allChats[chatId]);
            });
            saveAllChats();
            updateUI();
            scheduleMidnight();
        }, midnight - now + 1000);
    }
    scheduleMidnight();
</script>
</body>
</html>
